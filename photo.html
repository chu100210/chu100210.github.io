<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摄影作品 — CHU.LIFE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Cursor Glow -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- Header -->
  <header class="site-header" id="header">
    <div class="container">
      <a href="index.html" class="logo">CHU<span>.</span>LIFE</a>
      <nav class="site-nav">
        <a href="index.html#works">作品</a>
        <a href="index.html#awards">奖项</a>
        <a href="index.html#about">关于</a>
        <a href="index.html#contact">联系</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </div>
  </header>

  <!-- Hero Carousel -->
  <section class="photo-hero" id="photoHero">
    <div class="carousel-track" id="carouselTrack"></div>
    <div class="photo-hero-overlay"></div>
    <div class="carousel-dots" id="carouselDots"></div>

    <div class="photo-hero-content reveal">
      <div class="photo-tag">Photography</div>
      <h1>用镜头<br>捕捉光的形状</h1>
      <p>每一次按下快门，都是与世界的对话。<br>光影之间，记录那些转瞬即逝的真实。</p>
    </div>
    <div class="photo-hero-scroll">
      <span>下滑探索</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Gallery -->
  <section class="photo-gallery">
    <div class="container">
      <a href="index.html#works" class="photo-back reveal">← 返回作品集</a>
      <div class="photo-gallery-header reveal">
        <h2>全部摄影作品</h2>
        <p>街拍 · 风光 · 人文 · 生活碎片</p>
      </div>

      <!-- 城市掠影 -->
      <div class="gallery-category reveal">
        <h3 class="gallery-cat-title">城市掠影</h3>
        <div class="photo-grid">
          <div class="photo-item"><img src="images/photo/IMG20240813181722.webp" alt="城市掠影" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/IMG_20250807_151850_1784626771606edit.webp" alt="城市掠影" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/IMG_20260313_174455_1.webp" alt="城市掠影" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/IMG_20260321_193034.webp" alt="城市掠影" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/IMG_20260322_104849_1.webp" alt="城市掠影" loading="lazy"></div>
        </div>
      </div>

      <!-- 光影瞬间 -->
      <div class="gallery-category reveal">
        <h3 class="gallery-cat-title">光影瞬间</h3>
        <div class="photo-grid">
          <div class="photo-item"><img src="images/photo/IMG_20260502_140116.webp" alt="光影瞬间" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/IMG_20260502_140541.webp" alt="光影瞬间" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/IMG_20260502_210321.webp" alt="光影瞬间" loading="lazy"></div>
        </div>
      </div>

      <!-- 人文纪实 -->
      <div class="gallery-category reveal">
        <h3 class="gallery-cat-title">人文纪实</h3>
        <div class="photo-grid">
          <div class="photo-item"><img src="images/photo/CR1420250627_180319745.webp" alt="人文纪实" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250628_154138144.webp" alt="人文纪实" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250628_161915809.webp" alt="人文纪实" loading="lazy"></div>
        </div>
      </div>

      <!-- 生活碎片 -->
      <div class="gallery-category reveal">
        <h3 class="gallery-cat-title">生活碎片</h3>
        <div class="photo-grid">
          <div class="photo-item"><img src="images/photo/CR1420250628_164222457.webp" alt="生活碎片" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250628_164245153.webp" alt="生活碎片" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250628_170725099.webp" alt="生活碎片" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250629_093635227.webp" alt="生活碎片" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250629_142459996.webp" alt="生活碎片" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250629_145210379.webp" alt="生活碎片" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250629_185406386.webp" alt="生活碎片" loading="lazy"></div>
          <div class="photo-item"><img src="images/photo/CR1420250629_191258477.webp" alt="生活碎片" loading="lazy"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 CHU.LIFE. All rights reserved.</p>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img src="" alt="" id="lightboxImg">
  </div>

  <script>
    // ===== Theme Toggle =====
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved === 'light') html.classList.add('light');
    themeToggle.addEventListener('click', () => {
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('light') ? 'light' : 'dark');
    });

    // ===== Cursor Glow =====
    const glow = document.getElementById('cursorGlow');
    let mouseX = -500, mouseY = -500, currentX = -500, currentY = -500;
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    function animateGlow() {
      currentX += (mouseX - currentX) * 0.08;
      currentY += (mouseY - currentY) * 0.08;
      glow.style.left = currentX + 'px';
      glow.style.top = currentY + 'px';
      requestAnimationFrame(animateGlow);
    }
    animateGlow();
    document.addEventListener('mouseleave', () => { glow.style.opacity = '0'; });
    document.addEventListener('mouseenter', () => { glow.style.opacity = '1'; });

    // ===== Carousel =====
    const carouselPhotos = [
      "images/photo/IMG20240813181722.webp",
      "images/photo/IMG_20250807_151850_1784626771606edit.webp",
      "images/photo/IMG_20260313_174455_1.webp",
      "images/photo/IMG_20260321_193034.webp",
      "images/photo/IMG_20260322_104849_1.webp",
      "images/photo/IMG_20260502_140116.webp",
      "images/photo/IMG_20260502_140541.webp",
      "images/photo/IMG_20260502_210321.webp",
      "images/photo/CR1420250627_180319745.webp",
      "images/photo/CR1420250628_154138144.webp",
      "images/photo/CR1420250628_161915809.webp",
      "images/photo/CR1420250628_164222457.webp",
      "images/photo/CR1420250628_164245153.webp",
      "images/photo/CR1420250628_170725099.webp",
      "images/photo/CR1420250629_093635227.webp",
      "images/photo/CR1420250629_142459996.webp",
      "images/photo/CR1420250629_145210379.webp",
      "images/photo/CR1420250629_185406386.webp",
      "images/photo/CR1420250629_191258477.webp"
    ];

    const track = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('carouselDots');
    let slides, dots, currentSlide = 0, totalSlides, carouselInterval;

    // Build carousel — lazy load: only set src on first 3, rest use data-src
    carouselPhotos.forEach((src, i) => {
      const img = document.createElement('img');
      if (i < 3) img.src = src;
      else img.dataset.src = src;
      img.loading = 'lazy';
      img.className = 'carousel-slide' + (i === 0 ? ' active' : '');
      img.alt = '摄影作品';
      track.appendChild(img);

      const dot = document.createElement('button');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.dataset.index = i;
      dotsContainer.appendChild(dot);
    });

    slides = document.querySelectorAll('.carousel-slide');
    dots = document.querySelectorAll('.carousel-dot');
    totalSlides = slides.length;

    // Preload adjacent images when slide changes
    function preloadSlide(index) {
      const img = slides[index];
      if (img.dataset.src) {
        img.src = img.dataset.src;
        delete img.dataset.src;
      }
    }

    function goToSlide(index) {
      slides[currentSlide].classList.remove('active');
      dots[currentSlide].classList.remove('active');
      currentSlide = index;
      slides[currentSlide].classList.add('active');
      dots[currentSlide].classList.add('active');
      // Preload next two
      preloadSlide((currentSlide + 1) % totalSlides);
      preloadSlide((currentSlide + 2) % totalSlides);
    }

    function nextSlide() { goToSlide((currentSlide + 1) % totalSlides); }

    dots.forEach(dot => {
      dot.addEventListener('click', () => {
        goToSlide(parseInt(dot.dataset.index));
        resetCarouselTimer();
      });
    });

    function resetCarouselTimer() {
      clearInterval(carouselInterval);
      carouselInterval = setInterval(nextSlide, 4000);
    }
    carouselInterval = setInterval(nextSlide, 4000);

    const hero = document.getElementById('photoHero');
    hero.addEventListener('mouseenter', () => clearInterval(carouselInterval));
    hero.addEventListener('mouseleave', () => {
      carouselInterval = setInterval(nextSlide, 4000);
    });

    // ===== Scroll Reveal =====
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // ===== Lightbox =====
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');
    document.querySelectorAll('.photo-item').forEach(item => {
      item.addEventListener('click', () => {
        const img = item.querySelector('img');
        lightboxImg.src = img.src;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });
    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
